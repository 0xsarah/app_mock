<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaiya — App Mockup</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:#f0efe8;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 16px 48px;}
.page-label{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#999;margin-bottom:8px;}
.page-title{font-size:22px;font-weight:500;color:#1a1a1a;margin-bottom:4px;letter-spacing:-.01em;}
.page-sub{font-size:13px;color:#888;margin-bottom:28px;}

/* Phone */
.phone{width:320px;background:#fff;border:0.5px solid #ccc;border-radius:40px;overflow:hidden;height:640px;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.13);}
.statusbar{background:#1a1a2e;color:#fff;font-size:11px;padding:10px 18px 5px;display:flex;justify-content:space-between;flex-shrink:0;}
.screen{flex:1;overflow-y:auto;background:#f5f5f0;scrollbar-width:none;}
.screen::-webkit-scrollbar{display:none;}
.topbar{background:#1a1a2e;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.topbar-title{font-size:15px;font-weight:500;}
.topbar-sub{font-size:11px;opacity:.6;margin-top:1px;}
.avatar{width:30px;height:30px;border-radius:50%;background:#3a3a6e;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:#aac;}
.navbar{background:#1a1a2e;display:flex;flex-shrink:0;border-top:0.5px solid rgba(255,255,255,.1);}
.ntab{flex:1;padding:8px 4px 11px;text-align:center;cursor:pointer;color:rgba(255,255,255,.35);font-size:10px;transition:color .15s;user-select:none;}
.ntab.active{color:#7eb8f7;}
.ntab svg{display:block;margin:0 auto 2px;}

/* Screen components */
.card{background:#fff;border-radius:12px;border:0.5px solid #e8e8e0;margin:8px 12px;padding:14px;}
.card-sm{padding:10px 14px;}
.lbl{font-size:11px;color:#888;margin-bottom:2px;}
.val{font-size:20px;font-weight:500;color:#1a1a1a;}
.val-sm{font-size:14px;font-weight:500;color:#1a1a1a;}
.section-hd{font-size:11px;font-weight:500;color:#999;letter-spacing:.04em;text-transform:uppercase;padding:10px 16px 4px;}
.row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;border-bottom:0.5px solid #f0f0e8;}
.row:last-child{border-bottom:none;}
.badge{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:500;}
.badge-hi{background:#D4EDDA;color:#155724;}
.badge-pend{background:#FFF3CD;color:#856404;}
.badge-info{background:#e8f0fe;color:#1a73e8;}
.tag-lbl{font-size:13px;font-weight:500;color:#1a1a1a;}
.tag-sub{font-size:11px;color:#888;}
.tag-val{text-align:right;}
.pct{font-size:11px;color:#888;}
.erow{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;cursor:pointer;border-bottom:0.5px solid #f0f0e8;}
.erow:last-child{border-bottom:none;}
.erow:active{background:#fafaf7;}
.esub{background:#fafaf7;padding:0 14px;}
.esub-row{display:flex;justify-content:space-between;padding:7px 8px 7px 16px;border-bottom:0.5px solid #f0f0e8;font-size:12px;color:#555;}
.esub-row:last-child{border-bottom:none;}
.arr{font-size:10px;color:#bbb;margin-left:5px;}
.total-card{background:#1a1a2e;border-radius:12px;margin:8px 12px;padding:14px;color:#fff;}
.filter-bar{display:flex;gap:6px;padding:10px 12px 4px;overflow-x:auto;scrollbar-width:none;}
.filter-bar::-webkit-scrollbar{display:none;}
.fpill{padding:5px 13px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid #ccc;color:#777;background:#fff;white-space:nowrap;transition:all .15s;user-select:none;}
.fpill.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e;}
</style>
</head>
<body>

<div class="page-label">BFCH · Kaiya</div>
<div class="page-title">Interactive app mockup</div>
<div class="page-sub">Phase 1 MVP — tap through the screens</div>

<div class="phone">
  <div class="statusbar"><span>9:41</span><span>●●●</span></div>
  <div id="topbar"></div>
  <div class="screen" id="ksc"></div>
  <div class="navbar">
    <div class="ntab active" data-s="home" onclick="nav('home')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>Home
    </div>
    <div class="ntab" data-s="port" onclick="nav('port')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Portfolio
    </div>
    <div class="ntab" data-s="adv" onclick="nav('adv')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>Advisory
    </div>
    <div class="ntab" data-s="info" onclick="nav('info')">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>My Info
    </div>
  </div>
</div>

<script>
let cur='CHF', portFilter='all';
const rates={CHF:1,USD:1.12,EUR:1.02,HKD:8.76,SGD:1.52};
function fmt(v){return Math.round(v*rates[cur]).toLocaleString('en-US');}
function fmtM(v){return (v*rates[cur]/1e6).toFixed(1)+'M';}

const portData={
  all:{total:67055478,label:'All structures',entity:null,holdings:[
    {id:'alt',name:'Alternatives',val:32003982,pct:'47.7%',subs:[{n:'Aeolus Wind Fund III',v:18200000},{n:'PE Asia Growth',v:8600000},{n:'Real Assets LP',v:5203982}]},
    {id:'eq',name:'Equities',val:21167556,pct:'31.6%',subs:[{n:'Global Equity Basket',v:12400000},{n:'US Tech ETF',v:5767556},{n:'EM Markets',v:3000000}]},
    {id:'hld',name:'Crypto',val:7446678,pct:'11.1%',subs:[{n:'BTC (3.2 BTC)',v:4446678},{n:'ETH (12 ETH)',v:3000000}]},
    {id:'csh',name:'Cash',val:2218513,pct:'3.3%',subs:[{n:'UBS CHF',v:1200000},{n:'JB EUR',v:918513},{n:'Sygnum USD',v:100000}]},
    {id:'fi',name:'Fixed income',val:345661,pct:'0.5%',subs:[{n:'Swiss Govt Bond 2028',v:345661}]}
  ]},
  ppli:{total:47849643,label:'Oliver Berger PPLI · Zurich Life',entity:'Policy #LI-2021-4491',holdings:[
    {id:'alt',name:'Alternatives',val:32003982,pct:'66.9%',subs:[{n:'Aeolus Wind Fund III',v:18200000},{n:'PE Asia Growth',v:8600000},{n:'Real Assets LP',v:5203982}]},
    {id:'eq',name:'Equities',val:15000000,pct:'31.3%',subs:[{n:'Global Equity Basket',v:12400000},{n:'US Tech ETF',v:2600000}]},
    {id:'fi',name:'Fixed income',val:345661,pct:'0.7%',subs:[{n:'Swiss Govt Bond 2028',v:345661}]},
    {id:'csh',name:'Cash',val:500000,pct:'1.0%',subs:[{n:'Policy cash account',v:500000}]}
  ]},
  lie:{total:7386069,label:'OB Family Foundation · Liechtenstein',entity:'Est. 2019 · LGT Trustee',holdings:[
    {id:'eq',name:'Equities',val:6167556,pct:'83.5%',subs:[{n:'US Tech ETF',v:3167556},{n:'EM Markets',v:3000000}]},
    {id:'csh',name:'Cash',val:1218513,pct:'16.5%',subs:[{n:'UBS CHF',v:700000},{n:'JB EUR',v:518513}]}
  ]},
  direct:{total:11819766,label:'Direct holdings',entity:'Personal · APA accounts',holdings:[
    {id:'hld',name:'Crypto',val:7446678,pct:'63.0%',subs:[{n:'BTC (3.2 BTC)',v:4446678},{n:'ETH (12 ETH)',v:3000000}]},
    {id:'csh',name:'Cash · APA',val:2873088,pct:'24.3%',subs:[{n:'CHF current **** 4821',v:1673088},{n:'USD account **** 7203',v:1200000}]},
    {id:'eq',name:'Equities',val:1500000,pct:'12.7%',subs:[{n:'Global Equity (direct)',v:1500000}]}
  ]}
};

const topbars={
  home:{title:'Good morning, Oliver',sub:'Saturday, 30 May 2026'},
  port:{title:'Portfolio',sub:'Live data · Qplix'},
  adv:{title:'Advisory',sub:''},
  info:{title:'My Info',sub:'Oliver Berger'}
};

const S={
  home(){return`
    <div class="section-hd">Open tasks</div>
    <div class="card card-sm">
      <div class="row"><div><div class="tag-lbl">BTC → PPLI conversion</div><div class="tag-sub">Approve transfer docs</div></div><span class="badge badge-hi">Action</span></div>
      <div class="row"><div><div class="tag-lbl">KYC renewal</div><div class="tag-sub">Upload updated passport</div></div><span class="badge badge-pend">Pending</span></div>
      <div class="row"><div><div class="tag-lbl">LIE Foundation annual review</div><div class="tag-sub">Due Jun 15</div></div><span class="badge badge-pend">Due soon</span></div>
    </div>
    <div class="section-hd">Recent documents</div>
    <div class="card card-sm">
      <div class="row"><div><div class="tag-lbl" style="font-size:12px;">Q1 2026 Portfolio Report</div><div class="tag-sub">PDF · 2.1 MB · 28 May</div></div><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>
      <div class="row"><div><div class="tag-lbl" style="font-size:12px;">PPLI Policy Statement</div><div class="tag-sub">PDF · 890 KB · 14 May</div></div><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></div>
    </div>
    <div class="section-hd">Total wealth</div>
    <div class="total-card">
      <div style="font-size:11px;opacity:.5;margin-bottom:4px;">${cur} · All structures</div>
      <div style="font-size:26px;font-weight:500;">${cur} ${fmtM(67055478)}</div>
      <div style="font-size:11px;margin-top:6px;opacity:.5;">↑ +2.3% YTD · Last updated: today</div>
    </div>
    <div style="height:8px;"></div>`;},

  port(){
    const d=portData[portFilter];
    const pills=['all','ppli','lie','direct'].map(k=>
      `<div class="fpill${portFilter===k?' active':''}" onclick="setFilter('${k}')">${k==='all'?'All':k==='ppli'?'PPLI':k==='lie'?'LIE':'Direct'}</div>`
    ).join('');
    const rows=d.holdings.map(h=>`
      <div class="erow" data-tog="${h.id}">
        <div><span class="tag-lbl">${h.name}</span><span class="arr" id="arr-${h.id}">▶</span></div>
        <div class="tag-val"><div class="val-sm">${cur} ${fmt(h.val)}</div><div class="pct">${h.pct}</div></div>
      </div>
      <div id="exp-${h.id}" style="display:none" class="esub">
        ${h.subs.map(s=>`<div class="esub-row"><span>${s.n}</span><span>${cur} ${fmt(s.v)}</span></div>`).join('')}
      </div>`).join('');
    return`
    <div class="filter-bar">${pills}</div>
    ${d.entity?`<div style="padding:2px 16px 4px;font-size:11px;color:#888;">${d.entity}</div>`:''}
    <div class="card" style="margin-bottom:0;border-radius:12px 12px 0 0;">
      <div class="lbl">${d.label}</div>
      <div class="val">${cur} ${fmtM(d.total)}</div>
    </div>
    <div style="background:#fff;margin:0 12px;border:0.5px solid #e8e8e0;border-top:none;border-radius:0 0 12px 12px;overflow:hidden;">${rows}</div>
    <div style="height:8px;"></div>`;},

  adv(){return`
    <div class="section-hd">Messages</div>
    <div class="card card-sm">
      <div class="row"><div><div class="tag-lbl">Sarah M. — Relationship Manager</div><div class="tag-sub">BTC workflow update — 29 May</div></div><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a73e8" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div>
      <div class="row"><div><div class="tag-lbl">BFCH Team</div><div class="tag-sub">Q1 review call — 14 May</div></div></div>
    </div>
    <div class="section-hd">BTC → PPLI workflow</div>
    <div class="card card-sm">
      ${[['Sell BTC at Sygnum','Done'],['FX to CHF','Done'],['Wire to APA','In progress'],['Subscribe into PPLI','Pending']].map(([s,t],i)=>`
      <div style="display:flex;align-items:center;gap:10px;padding:7px 0;${i<3?'border-bottom:0.5px solid #f0f0e8':''}">
        <div style="width:20px;height:20px;border-radius:50%;background:${t==='Done'?'#D4EDDA':t==='In progress'?'#FFF3CD':'#f0f0e8'};display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0;">${t==='Done'?'✓':t==='In progress'?'…':''}</div>
        <div><div class="tag-lbl" style="font-size:12px;">${s}</div><div class="tag-sub">${t}</div></div>
      </div>`).join('')}
    </div>
    <div style="height:8px;"></div>`;},

  info(){return`
    <div class="card" style="display:flex;align-items:center;gap:12px;">
      <div style="width:44px;height:44px;border-radius:50%;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:500;color:#aac;">OB</div>
      <div><div style="font-size:15px;font-weight:500;color:#1a1a1a;">Oliver Berger</div><div class="tag-sub">Client since 2018 · HNWI</div></div>
    </div>
    <div class="section-hd">Display currency</div>
    <div class="card card-sm">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:13px;color:#1a1a1a;">Currency</span>
        <select id="cur-sel" style="font-size:13px;padding:4px 8px;border-radius:6px;border:0.5px solid #ccc;background:#f5f5f0;color:#1a1a1a;">
          <option value="CHF">CHF – Swiss Franc</option>
          <option value="USD">USD – US Dollar</option>
          <option value="EUR">EUR – Euro</option>
          <option value="HKD">HKD – Hong Kong Dollar</option>
          <option value="SGD">SGD – Singapore Dollar</option>
        </select>
      </div>
    </div>
    <div class="section-hd">Notifications</div>
    <div class="card card-sm">
      <div class="row"><span style="font-size:13px;">Tasks &amp; actions</span><div style="width:36px;height:20px;border-radius:10px;background:#1a1a2e;position:relative;"><div style="width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:2px;right:2px;"></div></div></div>
      <div class="row"><span style="font-size:13px;">New messages</span><div style="width:36px;height:20px;border-radius:10px;background:#1a1a2e;position:relative;"><div style="width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:2px;right:2px;"></div></div></div>
      <div class="row"><span style="font-size:13px;">Portfolio updates</span><div style="width:36px;height:20px;border-radius:10px;background:#eee;border:0.5px solid #ccc;position:relative;"><div style="width:16px;height:16px;border-radius:50%;background:#aaa;position:absolute;top:2px;left:2px;"></div></div></div>
    </div>
    <div class="section-hd">Contact</div>
    <div class="card card-sm">
      <div class="row"><span class="tag-sub">Email</span><span style="font-size:12px;">o.berger@email.com</span></div>
      <div class="row"><span class="tag-sub">KYC status</span><span class="badge badge-pend">Renewal due</span></div>
    </div>
    <div style="height:8px;"></div>`;}
};

function setFilter(f){
  portFilter=f;
  document.getElementById('ksc').innerHTML=S.port();
  wireExpand();
}

function wireExpand(){
  document.getElementById('ksc').addEventListener('click',function(e){
    const tog=e.target.closest('[data-tog]');
    if(tog){
      const id=tog.dataset.tog,exp=document.getElementById('exp-'+id),arr=document.getElementById('arr-'+id);
      if(exp){const open=exp.style.display!=='none';exp.style.display=open?'none':'block';if(arr)arr.textContent=open?'▶':'▼';}
    }
  },{once:true});
}

function nav(s){
  document.querySelectorAll('.ntab').forEach(t=>t.classList.toggle('active',t.dataset.s===s));
  const tb=topbars[s];
  document.getElementById('topbar').innerHTML=`<div class="topbar"><div><div class="topbar-title">${tb.title}</div>${tb.sub?`<div class="topbar-sub">${tb.sub}</div>`:''}</div><div class="avatar">OB</div></div>`;
  document.getElementById('ksc').innerHTML=S[s]();
  if(s==='port')wireExpand();
  if(s==='info'){
    const sel=document.getElementById('cur-sel');
    if(sel){
      sel.value=cur;
      sel.addEventListener('change',function(){cur=this.value;nav('info');});
    }
  }
}

nav('home');
</script>
</body>
</html>
